    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            text-decoration: none;
            color: #4A90D9;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .link-card:hover {
            background: rgba(74, 144, 217, 0.2);
            border-color: #4A90D9;
            transform: translateY(-2px);
